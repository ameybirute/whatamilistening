<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>What Am I Listening?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    padding:20px 30px;
    font-size:24px;
    font-weight:bold;
}

header span{
    color:#4ade80;
}

.mobile-break{
    display:none;
}

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#1b1b1b;
    border-radius:15px;
    padding:30px;
    text-align:center;
}

.cover{
    width:180px;
    height:180px;
    margin:auto;
    margin-bottom:20px;
    background:#2b2b2b;
    border-radius:12px;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.cover span{
    font-size:70px;
}

.song{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
    overflow-wrap:anywhere;
}

.artist{
    color:#bdbdbd;
    font-size:18px;
    margin-bottom:20px;
    overflow-wrap:anywhere;
}

.app{
    display:inline-block;
    background:#333;
    padding:8px 14px;
    border-radius:20px;
    font-size:14px;
    margin-bottom:25px;
}

.status{
    font-weight:bold;
    color:#4ade80;
}

@media(max-width:600px){

header{
    font-size:21px;
    line-height:1.25;
}

.mobile-break{
    display:block;
}

.cover{
    width:140px;
    height:140px;
}

.cover span{
    font-size:55px;
}

.song{
    font-size:22px;
}

.artist{
    font-size:16px;
}

}

</style>
</head>

<body>

<header>
    What<span class="mobile-break"></span>
    <span>Am</span><span class="mobile-break"></span>
    I<span class="mobile-break"></span>
    Listening?
</header>

<main>

<div class="card">

<div class="cover">
    <img id="coverImage">
    <span id="musicIcon">🎵</span>
</div>

<div class="song" id="song">
Nothing playing
</div>

<div class="artist" id="artist">

</div>

<div class="app" id="app">

</div>

<div class="status" id="status">
Loading...
</div>

</div>

</main>

<script>

const songElement=document.getElementById("song");
const artistElement=document.getElementById("artist");
const appElement=document.getElementById("app");
const statusElement=document.getElementById("status");

const coverImage=document.getElementById("coverImage");
const musicIcon=document.getElementById("musicIcon");

let latestData=null;

const ACTIVE_TIMEOUT=2*60*1000;

function getLastSeen(timestamp){

    if(!timestamp)
        return "Offline";

    const diff=Date.now()-timestamp;

    const minutes=Math.floor(diff/60000);

    const hours=Math.floor(minutes/60);

    const days=Math.floor(hours/24);

    if(minutes<1)
        return "Last seen less than a minute ago";

    if(minutes===1)
        return "Last seen 1 minute ago";

    if(minutes<60)
        return `Last seen ${minutes} minutes ago`;

    if(hours===1)
        return "Last seen 1 hour ago";

    if(hours<24)
        return `Last seen ${hours} hours ago`;

    if(days===1)
        return "Last seen yesterday";

    return `Last seen ${days} days ago`;

}

function updatePage(){

    if(!latestData)
        return;

    songElement.textContent=
        latestData.song || "Nothing playing";

    artistElement.textContent=
        latestData.artist || "";

    appElement.textContent=
        latestData.app || "";

    if(latestData.artwork){

        coverImage.src=latestData.artwork;

        coverImage.style.display="block";

        musicIcon.style.display="none";

    }else{

        coverImage.style.display="none";

        musicIcon.style.display="block";

    }

    const updateAge=
        Date.now()-latestData.lastUpdated;

    if(latestData.playing && updateAge<ACTIVE_TIMEOUT){

        statusElement.textContent=
            "🟢 Listening now";

        statusElement.style.color="#4ade80";

    }else{

        statusElement.textContent=
            getLastSeen(latestData.lastUpdated);

        statusElement.style.color="#999";

    }

}

async function fetchMusic(){

    try{

        const response=await fetch("/api/status",{
            cache:"no-store"
        });

        latestData=await response.json();

        updatePage();

    }catch(e){

        console.log(e);

        statusElement.textContent=
            "Unable to connect";

        statusElement.style.color="#999";

    }

}

fetch("https://api.whatamilistening.com/api/status", {
    cache: "no-store"
})

setInterval(fetchMusic,2000);

setInterval(updatePage,1000);

</script>

</body>
</html>
