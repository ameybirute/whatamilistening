<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>What Am I Listening?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

:root{
    --bg:#111;
    --card:#1b1b1b;
    --cover:#2b2b2b;
    --text:#fff;
    --secondary:#bdbdbd;
    --pill:#333;
    --accent:#4ade80;
    --toggle-bg:#2b2b2b;
    --toggle-thumb:#fff;
}

body.light{
    --bg:#f4f4f4;
    --card:#fff;
    --cover:#e9e9e9;
    --text:#111;
    --secondary:#666;
    --pill:#e5e5e5;
    --toggle-bg:#dcdcdc;
    --toggle-thumb:#fff;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    transition:background-color 1s ease,color 1s ease;
}

header{
    padding:20px 30px;
    font-size:24px;
    font-weight:bold;
}

header span{
    color:var(--accent);
}

.mobile-break{
    display:none;
}

.theme-toggle{
    position:fixed;
    top:18px;
    right:20px;
    width:40px;
    height:22px;
    border:none;
    border-radius:999px;
    background:var(--toggle-bg);
    cursor:pointer;
    padding:2px;
    z-index:100;
    transition:background-color 1s ease;
}

.theme-toggle-thumb{
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--toggle-thumb);
    display:flex;
    align-items:center;
    justify-content:center;
    transform:translateX(18px);
    transition:transform 0.6s ease,background-color 1s ease;
    box-shadow:0 1px 4px rgba(0,0,0,0.25);
}

body.light .theme-toggle-thumb{
    transform:translateX(0);
}

.theme-toggle-thumb img{
    width:12px;
    height:12px;
    object-fit:contain;
}

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border-radius:15px;
    padding:30px;
    text-align:center;
    transition:background-color 1s ease;
}

.card.offline{
    max-width:none;
    background:transparent;
    border-radius:0;
    padding:0;
}

.cover{
    width:270px;
    height:270px;
    margin:auto;
    margin-bottom:20px;
    background:var(--cover);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:background-color 1s ease;
}

.cover.offline{
    width:540px;
    height:540px;
    max-width:85vw;
    max-height:60vh;
    background:transparent;
    border-radius:0;
    overflow:visible;
    margin-bottom:10px;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.cover.offline img{
    object-fit:contain;
}

.cover span{
    font-size:70px;
}

.song{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
    overflow-wrap:anywhere;
}

.artist{
    color:var(--secondary);
    font-size:18px;
    margin-bottom:20px;
    overflow-wrap:anywhere;
    transition:color 1s ease;
}

.app{
    display:inline-block;
    background:var(--pill);
    padding:8px 14px;
    border-radius:20px;
    font-size:14px;
    margin-bottom:25px;
    transition:background-color 1s ease;
}

.status{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    font-weight:bold;
}

.status-dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--accent);
    flex-shrink:0;
}

.status.live .status-dot{
    animation:dotPulse 1.8s ease-in-out infinite;
}

@keyframes dotPulse{
    0%{
        box-shadow:0 0 0 0 rgba(74,222,128,0.7);
    }

    50%{
        box-shadow:0 0 0 7px rgba(74,222,128,0);
    }

    100%{
        box-shadow:0 0 0 0 rgba(74,222,128,0);
    }
}

@media(max-width:600px){
    header{
        position:absolute;
        top:0;
        left:0;
        padding:18px 20px;
        font-size:21px;
        line-height:1.25;
        z-index:10;
    }

    .mobile-break{
        display:block;
    }

    .theme-toggle{
        top:16px;
        right:16px;
    }

    main{
        min-height:100vh;
        padding:20px;
    }

    .cover{
        width:210px;
        height:210px;
    }

    .cover.offline{
        width:420px;
        height:420px;
        max-width:90vw;
        max-height:55vh;
    }

    .cover span{
        font-size:55px;
    }

    .song{
        font-size:22px;
    }

    .artist{
        font-size:16px;
    }
}
</style>
</head>

<body>

<button
    class="theme-toggle"
    id="themeToggle"
    aria-label="Toggle theme"
>
    <div class="theme-toggle-thumb">
        <img id="themeIcon" alt="">
    </div>
</button>

<header>
    What<span class="mobile-break"></span>
    <span>Am</span><span class="mobile-break"></span>
    I<span class="mobile-break"></span>
    Listening?
</header>

<main>
<div class="card" id="card">

    <div class="cover" id="cover">
        <img id="coverImage" alt="Music artwork">
        <span id="musicIcon">🎵</span>
    </div>

    <div class="song" id="song"></div>
    <div class="artist" id="artist"></div>
    <div class="app" id="app"></div>

    <div class="status" id="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking status...</span>
    </div>

</div>
</main>

<script>
const card =
    document.getElementById("card");

const songElement =
    document.getElementById("song");

const artistElement =
    document.getElementById("artist");

const appElement =
    document.getElementById("app");

const statusElement =
    document.getElementById("status");

const statusText =
    document.getElementById("statusText");

const statusDot =
    document.getElementById("statusDot");

const cover =
    document.getElementById("cover");

const coverImage =
    document.getElementById("coverImage");

const musicIcon =
    document.getElementById("musicIcon");

const themeToggle =
    document.getElementById("themeToggle");

const themeIcon =
    document.getElementById("themeIcon");

const moonIcon =
    "https://img.icons8.com/fluency-systems-regular/48/1A1A1A/bright-moon.png";

const sunIcon =
    "https://img.icons8.com/fluency-systems-regular/48/1A1A1A/sun--v1.png";

const offlineGif =
    "offline.gif";

let latestData = null;
let presenceData = null;

function applyTheme(theme){

    if(theme === "light"){

        document.body.classList.add(
            "light"
        );

        themeIcon.src =
            sunIcon;

    }else{

        document.body.classList.remove(
            "light"
        );

        themeIcon.src =
            moonIcon;
    }
}

const savedTheme =
    localStorage.getItem(
        "theme"
    ) || "light";

applyTheme(
    savedTheme
);

themeToggle.addEventListener(
    "click",
    function(){

        const isLight =
            document.body.classList.contains(
                "light"
            );

        const newTheme =
            isLight
                ? "dark"
                : "light";

        localStorage.setItem(
            "theme",
            newTheme
        );

        applyTheme(
            newTheme
        );
    }
);

function updatePage(){

    if(!latestData){
        return;
    }

    if(latestData.playing === true){

        card.classList.remove(
            "offline"
        );

        cover.classList.remove(
            "offline"
        );

        songElement.style.display =
            "block";

        artistElement.style.display =
            "block";

        appElement.style.display =
            "inline-block";

        songElement.textContent =
            fixCapitalization(
                latestData.song ||
                "Nothing playing"
            );

        artistElement.textContent =
            fixCapitalization(
                latestData.artist ||
                ""
            );

        appElement.textContent =
            latestData.app ||
            "";

        statusText.textContent =
            "Listening now";

        statusElement.style.color =
            "#4ade80";

        statusDot.style.display =
            "block";

        statusElement.classList.add(
            "live"
        );

        if(latestData.artwork){

            if(
                coverImage.getAttribute("src") !==
                latestData.artwork
            ){
                coverImage.src =
                    latestData.artwork;
            }

            coverImage.style.display =
                "block";

            musicIcon.style.display =
                "none";

        }else{

            coverImage.removeAttribute(
                "src"
            );

            coverImage.style.display =
                "none";

            musicIcon.style.display =
                "block";
        }

    }else{

        card.classList.add(
            "offline"
        );

        cover.classList.add(
            "offline"
        );

        songElement.style.display =
            "none";

        artistElement.style.display =
            "none";

        appElement.style.display =
            "none";

        statusText.textContent =
            getLastActivity(
                latestData.lastUpdated
            );

        statusElement.style.color =
            "#999";

        statusDot.style.display =
            "none";

        statusElement.classList.remove(
            "live"
        );

        if(
            coverImage.getAttribute("src") !==
            offlineGif
        ){
            coverImage.src =
                offlineGif;
        }

        coverImage.style.display =
            "block";

        musicIcon.style.display =
            "none";
    }
}

function getLastActivity(timestamp){

    if(!timestamp){
        return "No recent activity";
    }

    const diff =
        Date.now() - Number(timestamp);

    const minutes =
        Math.floor(diff / 60000);

    const hours =
        Math.floor(minutes / 60);

    const days =
        Math.floor(hours / 24);

    if(minutes < 1){
        return "Last activity less than a minute ago";
    }

    if(minutes === 1){
        return "Last activity 1 minute ago";
    }

    if(minutes < 60){
        return `Last activity ${minutes} minutes ago`;
    }

    if(hours === 1){
        return "Last activity 1 hour ago";
    }

    if(hours < 24){
        return `Last activity ${hours} hours ago`;
    }

    if(days === 1){
        return "Last activity yesterday";
    }

    return `Last activity ${days} days ago`;
}

function fixCapitalization(text){

    if(!text){
        return "";
    }

    const exceptions =
        new Set([
            "BTS",
            "BLACKPINK",
            "ABBA",
            "MGMT",
            "M83",
            "U2",
            "UB40",
            "INXS",
            "DJ",
            "EDM",
            "OST",
            "NF",
            "MC",
            "PCRC"
        ]);

    return text
        .split(" ")
        .map(
            word => {

                const cleanWord =
                    word.replace(
                        /[^A-Za-z0-9&$/.+-]/g,
                        ""
                    );

                if(
                    exceptions.has(
                        cleanWord.toUpperCase()
                    )
                ){
                    return word;
                }

                if(
                    cleanWord.length > 1 &&
                    cleanWord === cleanWord.toUpperCase() &&
                    /[A-Z]/.test(cleanWord)
                ){

                    const formatted =
                        cleanWord.charAt(0).toUpperCase() +
                        cleanWord.slice(1).toLowerCase();

                    return word.replace(
                        cleanWord,
                        formatted
                    );
                }

                return word;
            }
        )
        .join(" ");
}

async function fetchPresence(){

    try{

        const response =
            await fetch(
                "/api/presence",
                {
                    cache:"no-store"
                }
            );

        if(!response.ok){

            throw new Error(
                `Presence returned ${response.status}`
            );
        }

        presenceData =
            await response.json();

        return presenceData;

    }catch(error){

        console.error(
            "Could not load presence:",
            error
        );

        return null;
    }
}

async function fetchMusic(){

    const presence =
        await fetchPresence();

    if(
        presence &&
        presence.playing === false
    ){

        latestData = {
            playing:false,
            lastUpdated:
                presence.lastSeen
        };

        updatePage();

        return;
    }

    try{

        const response =
            await fetch(
                "https://api.whatamilistening.com/api/status",
                {
                    cache:"no-store"
                }
            );

        if(!response.ok){

            throw new Error(
                `Server returned ${response.status}`
            );
        }

        latestData =
            await response.json();

        updatePage();

    }catch(error){

        console.error(
            "Could not load current music:",
            error
        );

        statusText.textContent =
            "Loading current music...";

        statusElement.style.color =
            "#999";

        statusDot.style.display =
            "none";

        statusElement.classList.remove(
            "live"
        );
    }
}

fetchMusic();

setInterval(
    fetchMusic,
    5000
);

setInterval(
    updatePage,
    1000
);
</script>

</body>
</html>
